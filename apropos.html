<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="À propos de STPMa — Société Travaux Polyvalents Marocains. Une expertise solide et éprouvée en travaux routiers, signalisation et sécurité routière au Maroc." />
  <title>À Propos — STPMa | Travaux Routiers, Signalisation & Sécurité</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ============================================================
       RESET & TOKENS
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── CAT / STPMa palette officielle ── */
      --black:         #111111;
      --black-mid:     #1A1A1A;
      --black-card:    #222222;
      --black-hover:   #2A2A2A;
      --yellow:        #FFCD00;
      --yellow-dark:   #E0B400;
      --yellow-light:  #FFD740;
      --yellow-glow:   rgba(255,205,0,0.15);
      --yellow-border: rgba(255,205,0,0.28);
      --white:         #FFFFFF;
      --off-white:     #F5F5F5;
      --grey-mid:      #A6A6A6;
      --grey-dark:     #333333;
      --text-body:     #D0D0D0;
      --text-muted:    #A6A6A6;
      --border-faint:  rgba(255,255,255,0.07);
      /* ── aliases compatibilité (sans bleu) ── */
      --asphalt:       #111111;
      --asphalt-mid:   #1A1A1A;
      --asphalt-card:  #222222;

      --font-display: 'Barlow Condensed', sans-serif;
      --font-body:    'Inter', sans-serif;
      --ease:         cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-body);
      background: var(--asphalt);
      color: var(--text-body);
      overflow-x: hidden;
    }

    img { max-width: 100%; display: block; }
    a   { text-decoration: none; color: inherit; }
    ul  { list-style: none; }

    /* ============================================================
       TYPOGRAPHY HELPERS
    ============================================================ */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 0.65rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 1rem;
    }
    .tag::before {
      content: '';
      display: block;
      width: 26px;
      height: 2px;
      background: var(--yellow);
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 3.5vw, 2.8rem);
      font-weight: 800;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 1rem;
    }

    .section-sub {
      font-size: 0.93rem;
      color: var(--text-muted);
      line-height: 1.75;
      max-width: 520px;
    }

    .accent { color: var(--yellow); }

    /* ============================================================
       LAYOUT
    ============================================================ */
    .container {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 5%;
    }

    section { padding: 96px 0; }

    /* ============================================================
       BUTTONS
    ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-body);
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      padding: 0.85rem 1.8rem;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      transition: all 0.26s var(--ease);
    }
    .btn-primary {
      background: var(--yellow);
      color: var(--asphalt);
    }
    .btn-primary:hover {
      background: var(--yellow-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(245,166,35,0.35);
    }
    .btn-outline {
      background: transparent;
      color: var(--white);
      border: 1.5px solid rgba(255,255,255,0.2);
    }
    .btn-outline:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* ============================================================
       SCROLL REVEAL
    ============================================================ */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.65s var(--ease), transform 0.65s var(--ease);
    }
    .reveal.d1 { transition-delay: 0.10s; }
    .reveal.d2 { transition-delay: 0.20s; }
    .reveal.d3 { transition-delay: 0.30s; }
    .reveal.d4 { transition-delay: 0.40s; }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ============================================================
       NAVIGATION
    ============================================================ */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 900;
      height: 74px;
      background: rgba(14, 27, 45, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--yellow-border);
      transition: box-shadow 0.3s;
    }
    .nav.scrolled {
      box-shadow: 0 4px 30px rgba(0,0,0,0.5);
    }

    .nav__inner {
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── Logo ── */
    .nav__logo {
      height: 64px;
      display: flex;
      align-items: center;
    }
    .nav__logo img {
      height: 64px;
      width: auto;
      object-fit: contain;
    }

    /* ── Links ── */
    .nav__links {
      display: flex;
      align-items: center;
      gap: 2.2rem;
    }

    .nav__link {
      font-size: 0.77rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.6);
      position: relative;
      transition: color 0.2s;
    }
    .nav__link::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 0; right: 0;
      height: 1.5px;
      background: var(--yellow);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s var(--ease);
    }
    .nav__link:hover,
    .nav__link.active { color: var(--white); }
    .nav__link:hover::after,
    .nav__link.active::after { transform: scaleX(1); }

    .nav__cta {
      background: var(--yellow);
      color: var(--asphalt) !important;
      padding: 0.55rem 1.4rem;
      border-radius: 3px;
      font-size: 0.77rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      transition: all 0.2s;
    }
    .nav__cta:hover {
      background: var(--yellow-dark);
      transform: translateY(-1px);
    }
    .nav__cta::after { display: none !important; }

    /* ── Burger ── */
    .nav__burger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      background: none;
      border: none;
    }
    .nav__burger span {
      display: block;
      width: 24px; height: 2px;
      background: var(--white);
      border-radius: 2px;
      transition: all 0.25s;
    }
    .nav__burger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .nav__burger.open span:nth-child(2) { opacity: 0; }
    .nav__burger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* ── Mobile drawer ── */
    .nav__drawer {
      display: none;
      position: fixed;
      top: 74px; left: 0; right: 0; bottom: 0;
      background: var(--black);
      z-index: 899;
      flex-direction: column;
      padding: 2.5rem 5%;
      gap: 0.3rem;
    }
    .nav__drawer.open { display: flex; }
    .nav__drawer .nav__link {
      font-size: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border-faint);
      color: var(--off-white);
    }
    .nav__drawer .nav__cta {
      margin-top: 1.5rem;
      text-align: center;
      padding: 1rem;
      border-radius: 3px;
    }

    /* ============================================================
       HERO
    ============================================================ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 74px;
      overflow: hidden;
    }

    /* ── Background video / image ── */
    .hero__bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    .hero__video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.35;
    }

    /* Fallback image si la vidéo n'est pas disponible */
    .hero__bg-img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      opacity: 0.35;
    }

    /* Dégradé de lisibilité sur le fond */
    .hero__overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to right, rgba(14,27,46,0.92) 45%, rgba(14,27,46,0.45) 100%),
        linear-gradient(to top,   rgba(14,27,46,0.8)  0%,  transparent 50%);
      z-index: 1;
    }

    .hero__content {
      position: relative;
      z-index: 2;
    }

    .hero__eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--yellow);
      margin-bottom: 1.4rem;
    }
    .hero__eyebrow::before {
      content: '';
      display: block;
      width: 30px; height: 2px;
      background: var(--yellow);
    }

    .hero__title {
      font-family: var(--font-display);
      font-size: clamp(3.2rem, 7vw, 6rem);
      font-weight: 900;
      line-height: 0.95;
      color: var(--white);
      letter-spacing: 0.01em;
      margin-bottom: 1.5rem;
    }
    .hero__title .line-yellow { color: var(--yellow); display: block; }

    .hero__sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.75;
      max-width: 500px;
      margin-bottom: 2.8rem;
    }

    .hero__ctas {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    /* ── Stats bar ── */
    .hero__stats {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      background: rgba(10,10,10,0.75);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--yellow-border);
    }
    .hero__stats-inner {
      display: flex;
      justify-content: space-between;
    }
    .stat {
      flex: 1;
      padding: 1.6rem 0;
      text-align: center;
      border-right: 1px solid var(--border-faint);
    }
    .stat:last-child { border-right: none; }
    .stat__num {
      font-family: var(--font-display);
      font-size: 2.6rem;
      font-weight: 900;
      color: var(--yellow);
      line-height: 1;
    }
  </style>
</head>
<body>
  </body>
</html>
