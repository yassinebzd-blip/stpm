<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="STPMa — Société Travaux Polyvalents Marocains. Spécialiste en travaux routiers, signalisation et sécurité routière au Maroc." />
  <meta name="keywords" content="marquage routier, signalisation, glissières, travaux routiers, Maroc, Errachidia, Meknès" />
  <title>STPMa — Travaux Routiers, Signalisation & Sécurité Routière</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #0a0a0a;
      --asphalt: #111111;
      --yellow: #FFCD00;
      --yellow-dark: #E0B400;
      --text: #d0d0d0;
      --text-muted: #a0a0a0;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--asphalt);
      color: var(--text);
      line-height: 1.6;
    }

    .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

    /* Navigation */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 1000;
      border-bottom: 1px solid rgba(255,205,0,0.2);
    }

    .nav-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
    }

    .logo img { height: 65px; }

    /* Hero */
    .hero {
      height: 100vh;
      min-height: 700px;
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('assets/hero-autoroute.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      position: relative;
    }

    .hero-content {
      max-width: 800px;
      z-index: 2;
    }

    .hero h1 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1.5rem;
    }

    .hero .accent { color: var(--yellow); }

    .btn {
      display: inline-block;
      padding: 16px 36px;
      background: var(--yellow);
      color: #111;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      transition: all 0.3s;
    }

    .btn:hover {
      background: #fff;
      transform: translateY(-4px);
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <div class="container nav-content">
      <a href="index.html" class="logo">
        <img src="logo.png" alt="STPMa">
      </a>
      <div>
        <a href="services.html" style="margin:0 20px; color:white;">الخدمات</a>
        <a href="references.html" style="margin:0 20px; color:white;">المراجع</a>
        <a href="apropos.html" style="margin:0 20px; color:white;">عن الشركة</a>
        <a href="contact.html" class="btn" style="padding:10px 24px; font-size:0.9rem;">اتصل بنا</a>
      </div>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="container hero-content">
      <p style="color:var(--yellow); font-weight:700; letter-spacing:2px;">STPMa - SOCIÉTÉ TRAVAUX POLYVALENTS MAROCAINS</p>
      <h1>نبني <span class="accent">طرق آمنة</span><br>للمستقبل</h1>
      <p style="font-size:1.3rem; max-width:580px; margin-bottom:2rem;">
        متخصصون في المرقمة الأفقية والعمودية، السلامة الطرقية والأشغال الطرقية عبر كافة أنحاء المغرب.
      </p>
      <a href="contact.html" class="btn">احصل على عرض أسعار الآن</a>
    </div>
  </section>

  <!-- باقي الصفحة يمكن نكملها... -->

</body>
</html>
